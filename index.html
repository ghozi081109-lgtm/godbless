<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>godbless.com</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        /* Menggunakan flexbox pada body agar footer terdorong ke paling bawah layar */
        html, body {
            height: 100%;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            display: flex;
            flex-direction: column;
        }

        /* HEADER ATAS */
        header {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px 20px;
            background-color: #ffffff;
            border-bottom: 1px solid #eeeeee;
        }

        /* TOMBOL TIGA GARIS (HAMBURGER) */
        .menu-btn {
            position: absolute;
            left: 20px;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 24px;
            height: 18px;
            z-index: 1000;
        }
        .menu-btn span {
            display: block;
            height: 2px;
            width: 100%;
            background-color: #000000;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        /* LOGO DI TENGAH HEADER */
        .header-logo {
            height: 35px;
            width: auto;
        }

        /* OVERLAY MENU SLIDE-IN */
        .nav-menu {
            position: fixed;
            top: 0;
            left: -100%;
            width: 250px;
            height: 100%;
            background-color: #ffffff;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            transition: left 0.3s ease;
            z-index: 999;
            padding-top: 80px;
        }
        .nav-menu.active {
            left: 0;
        }
        .nav-menu ul {
            list-style: none;
        }
        .nav-menu li {
            border-bottom: 1px solid #f0f0f0;
        }
        .nav-menu a {
            display: block;
            padding: 18px 25px;
            color: #000000;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .nav-menu a:hover {
            background-color: #f9f9f9;
        }

        /* GELAPIN BACKGROUND PAS MENU BUKA */
        .overlay-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            display: none;
            z-index: 998;
        }
        .overlay-bg.active {
            display: block;
        }

        /* WADAH VIDEO */
        .video-container {
            width: 100%;
            max-width: 700px;
            margin: 20px auto 10px auto;
            padding: 0 15px;
        }
        .video-container video {
            width: 100%;
            display: block;
            border-radius: 6px;
        }

        /* SECTION ALAMAT STORE (SUDAH RATA TENGAH & LEBIH KECIL) */
        .store-address {
            text-align: center; /* Rata tengah */
            padding: 15px 20px 25px 20px;
            margin-top: auto; /* Mendorong konten ini dan footer ke paling bawah */
        }
        .store-address h3 {
            font-size: 13px; /* Diperkecil dikit */
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 6px;
            color: #000000;
        }
        .store-address p {
            font-size: 11.5px; /* Alamat diperkecil biar proporsional */
            color: #555555;
            line-height: 1.5;
            max-width: 320px; /* Membatasi lebar teks agar rapi saat patah baris */
            margin: 0 auto; /* Supaya teks bloknya tetap di tengah */
        }

        /* FOOTER COPYRIGHT */
        footer {
            background-color: #000000;
            color: #ffffff;
            padding: 15px;
            text-align: center;
            font-size: 10.5px; /* Diperkecil biar elegan */
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- BACKGROUND GELAP PAS MENU BUKA -->
    <div class="overlay-bg" id="overlay" onclick="toggleMenu()"></div>

    <!-- HEADER -->
    <header style="padding: 15px; position: relative; z-index: 999;">
        <!-- Tombol Tiga Garis -->
        <button class="menu-btn" onclick="toggleMenu()" aria-label="Menu" style="font-size: 24px; background: none; border: none; cursor: pointer;">
            ☰
        </button>
    </header>

    <!-- SLIDE MENU -->
    <nav class="nav-menu" id="sideMenu" style="z-index: 1000;">
        <ul style="list-style: none; padding: 20px;">
            <li style="margin-bottom: 15px;">
                <a href="halaman2.html" style="color: #111; text-decoration: none; font-weight: bold; font-size: 18px;">SHOP</a>
            </li>
            <li style="margin-bottom: 15px;">
                <a href="about.html" style="color: #111; text-decoration: none; font-weight: bold; font-size: 18px;">ABOUT</a>
            </li>
            
            <!-- IKON KERANJANG -->
            <li style="margin-bottom: 15px;">
                <a href="halaman2.html" class="cart-icon" style="color: #111; text-decoration: none; font-weight: bold; font-size: 18px;">
                    🛒 Keranjang (<span id="cartCount">0</span>)
                </a>
            </li>
        </ul>
    </nav>
  
  <!-- KONTEN VIDEO UTAMA -->
    <div class="video-container">
        <video controls autoplay loop muted playsinline>
            <source src="skate.mp4" type="video/mp4">
        </video>
    </div>

    <!-- TULISAN ALAMAT STORE (SUDAH RATA TENGAH & PROPORSIONAL) -->
    <div class="store-address">
        <h3>Godbless Official Store</h3>
        <p>Jl. Dukuhan No. 13, Kec. Minggir, Kabupaten Sleman, Daerah Istimewa Yogyakarta 55562-Indonesia</p>
    </div>

    <!-- FOOTER COPYRIGHT -->
    <footer>
        <p>Copyright &copy; 2026 godbless.com. All Rights Reserved.</p>
    </footer>

</body>
</html>
