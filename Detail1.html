<script>
    function addToCart(namaProduk, harga) {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let itemIndex = cart.findIndex(item => item.nama === namaProduk);

        if (itemIndex > -1) {
            cart[itemIndex].jumlah += 1;
        } else {
            cart.push({ nama: namaProduk, harga: harga, jumlah: 1 });
        }

        localStorage.setItem("cart", JSON.stringify(cart));
        alert(namaProduk + " berhasil ditambahkan ke keranjang!");
    }
</script>
