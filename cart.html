<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Godbless Official Store - Keranjang Saya</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #111111;
            padding-bottom: 40px;
        }

        /* HEADER / NAVBAR */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            border-bottom: 1px solid #eeeeee;
            position: sticky;
            top: 0;
            background: #ffffff;
            z-index: 900;
        }

        .back-link {
            text-decoration: none;
            color: #111111;
            font-weight: 500;
            font-size: 14px;
        }

        header h2 {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* LIST KERANJANG */
        .cart-list {
            margin-bottom: 25px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eeeeee;
        }

        .item-info h4 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .item-info p {
            font-size: 13px;
            color: #666666;
            margin-bottom: 4px;
        }

        .item-price {
            font-size: 14px;
            font-weight: 700;
        }

        /* ACTIONS (QTY & DELETE) */
        .item-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .qty-box {
            display: flex;
            align-items: center;
            border: 1px solid #cccccc;
            border-radius: 4px;
        }

        .qty-box button {
            width: 28px;
            height: 28px;
            background: transparent;
            border: none;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .qty-box span {
            font-size: 13px;
            padding: 0 8px;
            font-weight: 600;
        }

        .btn-delete {
            background: none;
            border: none;
            color: #ff3b30;
            font-size: 18px;
            cursor: pointer;
            padding: 0 5px;
        }

        /* RINGKASAN TOTAL */
        .summary-box {
            background: #f9f9f9;
            padding: 18px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            font-weight: 700;
        }

        /* TOMBOL CHECKOUT WA */
        .btn-checkout-wa {
            display: block;
            width: 100%;
            padding: 16px;
            background-color: #25D366;
            color: #ffffff;
            text-align: center;
            text-decoration: none;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.2);
        }

        .btn-checkout-wa:active {
            opacity: 0.9;
        }

        /* EMPTY STATE */
        .empty-cart {
            text-align: center;
            padding: 50px 20px;
        }

        .empty-cart p {
            font-size: 15px;
            color: #777777;
            margin-bottom: 15px;
        }

        .btn-shop-now {
            display: inline-block;
            padding: 10px 20px;
            background: #111111;
            color: #ffffff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <a href="shop.html" class="back-link">&larr; Lanjut Belanja</a>
        <h2>KERANJANG SAYA</h2>
        <div style="width: 80px;"></div> <!-- Spacer penyeimbang -->
    </header>

    <div class="container">
        <!-- WADAH DAFTAR ITEM -->
        <div id="cartContent">
            <!-- Isi keranjang disuntik dari JavaScript -->
        </div>
    </div>

    <script>
        // MASUKIN NOMOR WA LUG DI SINI (Pakai format 62...)
        const NOMOR_WA = "62817318831";

        // LOAD DATA KERANJANG DARI LOCALSTORAGE
        function loadCart() {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            let container = document.getElementById("cartContent");

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <p>Keranjang belanjaan lu masih kosong nih der.</p>
                        <a href="shop.html" class="btn-shop-now">Lihat Produk</a>
                    </div>
                `;
                return;
            }

            let html = `<div class="cart-list">`;
            let grandTotal = 0;

            cart.forEach((item, index) => {
                let subtotal = item.harga * item.jumlah;
                grandTotal += subtotal;

                html += `
                    <div class="cart-item">
                        <div class="item-info">
                            <h4>${item.nama}</h4>
                            <p>Size: <strong>${item.size}</strong></p>
                            <p class="item-price">IDR ${item.harga.toLocaleString('id-ID')}</p>
                        </div>
                        <div class="item-actions">
                            <div class="qty-box">
                                <button onclick="updateQty(${index}, -1)">-</button>
                                <span>${item.jumlah}</span>
                                <button onclick="updateQty(${index}, 1)">+</button>
                            </div>
                            <button class="btn-delete" onclick="removeItem(${index})">&times;</button>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;

            // RINGKASAN TOTAL + TOMBOL WA
            html += `
                <div class="summary-box">
                    <div class="summary-row">
                        <span>Total Pembayaran:</span>
                        <span>IDR ${grandTotal.toLocaleString('id-ID')}</span>
                    </div>
                </div>
                <button class="btn-checkout-wa" onclick="checkoutWA()">
                    Checkout via WhatsApp &rarr;
                </button>
            `;

            container.innerHTML = html;
        }

        // FUNGSI UBAH QTY
        function updateQty(index, change) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            cart[index].jumlah += change;

            if (cart[index].jumlah < 1) {
                cart[index].jumlah = 1;
            }

            localStorage.setItem("cart", JSON.stringify(cart));
            loadCart();
        }

        // FUNGSI HAPUS ITEM
        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            cart.splice(index, 1);
            localStorage.setItem("cart", JSON.stringify(cart));
            loadCart();
        }

        // FUNGSI CHECKOUT OTOMATIS FORMAT CHAT WA
        function checkoutWA() {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            if (cart.length === 0) return;

            let message = "Halo Godbless Store, saya mau pesan barang berikut:\n\n";
            let grandTotal = 0;

            cart.forEach((item, i) => {
                let subtotal = item.harga * item.jumlah;
                grandTotal += subtotal;
                message += `${i + 1}. *${item.nama}*\n   Size: ${item.size}\n   Jumlah: ${item.jumlah}x\n   Harga: IDR ${subtotal.toLocaleString('id-ID')}\n\n`;
            });

            message += `-------------------------------\n`;
            message += `*Total Belanja:* IDR ${grandTotal.toLocaleString('id-ID')}\n\n`;
            message += `Mohon diinfokan total ongkir dan rekening pembayarannya ya min. Terima kasih!`;

            // Buka WhatsApp
            let waUrl = `https://wa.me/${NOMOR_WA}?text=${encodeURIComponent(message)}`;
            window.open(waUrl, '_blank');
        }

        // Jalankan saat halaman dibuka
        loadCart();
    </script>
</body>
</html>
